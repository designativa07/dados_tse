<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Chat de Inteligência TSE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@crayonai/react-ui@latest/styles/index.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
    />
    <style>
      body {
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        margin: 0;
        padding: 0;
        background: #0b1220;
        color: #e5e7eb;
      }
      .chat-page {
        max-width: 960px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 16px;
        box-sizing: border-box;
      }
      .chat-header {
        margin-bottom: 16px;
      }
      .chat-header h1 {
        margin: 0 0 8px;
        font-size: 1.6rem;
      }
      .chat-header p {
        margin: 0;
        color: #9ca3af;
        font-size: 0.95rem;
      }
      .chat-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
        border-radius: 12px;
        border: 1px solid #1f2937;
        padding: 12px;
        background: radial-gradient(circle at top, #1f2937, #020617);
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding-right: 4px;
      }
      .chat-message {
        max-width: 80%;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 0.95rem;
      }
      .chat-message-user {
        align-self: flex-end;
        background: #4f46e5;
        color: #f9fafb;
      }
      .chat-message-assistant {
        align-self: flex-start;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(55, 65, 81, 0.7);
      }
      .chat-input-bar {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }
      .chat-input-bar input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid #374151;
        background: #020617;
        color: #e5e7eb;
        outline: none;
      }
      .chat-input-bar input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.4);
      }
      .chat-input-bar button {
        padding: 10px 18px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #4f46e5, #22c55e);
        color: #f9fafb;
        font-weight: 500;
        cursor: pointer;
        transition: filter 0.15s ease;
      }
      .chat-input-bar button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .chat-input-bar button:not(:disabled):hover {
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/chat-inteligencia.bundle.js"></script>
  </body>
  </html>
